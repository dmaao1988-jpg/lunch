<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>오늘 점심 투표</title>
<link rel="icon" href="data:,">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Gowun+Batang:wght@400;700&family=IBM+Plex+Sans+KR:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#EFE7D2; --card:#FBF6E7; --ink:#221C12; --ink-soft:#6a5f49;
    --red:#D3382A; --jade:#2F5D50; --steel:#2B5C74; --brass:#B5892F;
    --line:rgba(34,28,18,.16); --line-strong:rgba(34,28,18,.34);
    --shadow:0 10px 30px -12px rgba(34,28,18,.35);
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{font-family:"IBM Plex Sans KR",system-ui,sans-serif;
    background:radial-gradient(1200px 500px at 80% -10%, rgba(181,137,47,.10), transparent 60%), var(--paper);
    color:var(--ink);-webkit-font-smoothing:antialiased;line-height:1.55;padding-bottom:60px}
  .wrap{max-width:560px;margin:0 auto;padding:20px 16px 0}

  .head{display:flex;align-items:baseline;justify-content:space-between;gap:10px;margin-bottom:16px}
  .head h1{font-family:"Black Han Sans",sans-serif;font-weight:400;font-size:23px;margin:0;letter-spacing:.4px}
  .head .dt{font-family:"IBM Plex Mono",monospace;font-size:12.5px;color:var(--ink-soft)}
  .back{font-size:12.5px;color:var(--ink-soft);text-decoration:none;border-bottom:1px solid var(--line)}

  .card{background:var(--card);border:1px solid var(--line-strong);border-radius:4px;padding:17px;margin-bottom:14px;box-shadow:0 2px 0 rgba(34,28,18,.04)}
  .card h2{font-family:"Gowun Batang",serif;font-weight:700;font-size:16px;margin:0 0 4px}
  .card .sub{font-size:12.5px;color:var(--ink-soft);margin-bottom:14px}

  label.fl{display:block;font-size:12.5px;font-weight:600;color:var(--ink-soft);margin-bottom:5px}
  input[type=text],input[type=password]{width:100%;font-family:inherit;font-size:15px;padding:11px;border:1px solid var(--line-strong);
    border-radius:3px;background:var(--paper);color:var(--ink)}
  input[type=text]:focus,input[type=password]:focus{outline:2px solid var(--brass);outline-offset:0}

  .btn{font-family:inherit;font-weight:600;font-size:14px;cursor:pointer;border-radius:3px;
    border:1px solid var(--line-strong);background:var(--card);color:var(--ink);padding:11px 15px;line-height:1;
    -webkit-tap-highlight-color:transparent;text-decoration:none;display:inline-block;text-align:center}
  .btn:active{transform:translateY(1px)}
  .btn.primary{background:var(--red);border-color:var(--red);color:#fff}
  .btn.jade{background:var(--jade);border-color:var(--jade);color:#fff}
  .btn.kakao{background:#FEE500;border-color:#e6ce00;color:#3A1D1D}
  .btn.ghost{background:transparent}
  .btn.sm{padding:8px 12px;font-size:12.5px}
  .btn.block{width:100%}
  .row{display:flex;gap:8px;flex-wrap:wrap}

  .cand{display:flex;flex-direction:column;gap:9px;margin-top:4px}
  .opt{position:relative;background:var(--paper);border:1px solid var(--line);border-radius:4px;
    padding:13px 14px;cursor:pointer;overflow:hidden;transition:border-color .12s}
  .opt:hover{border-color:var(--jade)}
  .opt.mine{border-color:var(--red);border-width:2px;padding:12px 13px}
  .opt .fill{position:absolute;inset:0 auto 0 0;background:rgba(47,93,80,.13);width:0;transition:width .4s ease;z-index:0}
  .opt.lead .fill{background:rgba(211,56,42,.16)}
  .opt .inner{position:relative;z-index:1;display:flex;align-items:center;gap:11px}
  .opt .em{font-size:22px;flex-shrink:0}
  .opt .nm{flex:1;min-width:0;font-weight:700;font-size:15px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .opt .who{font-size:11.5px;color:var(--ink-soft);font-weight:400;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .opt .ct{font-family:"IBM Plex Mono",monospace;font-weight:600;font-size:15px;flex-shrink:0}
  .opt .ct .u{font-size:11px;color:var(--ink-soft);font-weight:500}
  .opt.mine .badge-me{position:absolute;top:0;right:0;background:var(--red);color:#fff;font-size:10px;
    padding:2px 7px;border-radius:0 0 0 4px;z-index:2;font-weight:700}

  .chk{display:flex;align-items:center;gap:10px;padding:9px 4px;border-bottom:1px solid var(--line);font-size:14px;cursor:pointer}
  .chk:last-child{border-bottom:none}
  .chk input{width:19px;height:19px;accent-color:var(--jade);flex-shrink:0}

  .result{text-align:center;padding:6px 0 4px}
  .result .lbl{font-family:"Gowun Batang",serif;font-size:13px;color:var(--ink-soft)}
  .result .win{font-family:"Black Han Sans",sans-serif;font-size:30px;color:var(--red);margin:5px 0 3px;line-height:1.2}
  .result .cnt{font-family:"IBM Plex Mono",monospace;font-size:12.5px;color:var(--ink-soft)}

  .status{font-size:12px;color:var(--ink-soft);text-align:center;margin-top:14px;font-family:"IBM Plex Mono",monospace}
  .live{display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--jade);margin-right:5px;
    animation:pulse 1.8s infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.25}}
  .err{background:rgba(211,56,42,.08);border:1px solid rgba(211,56,42,.35);color:var(--red);
    font-size:12.5px;padding:11px;border-radius:3px;line-height:1.6}
  .hint{font-size:11.5px;color:var(--ink-soft);line-height:1.6;margin-top:10px;
    background:rgba(34,28,18,.04);padding:10px;border-radius:3px}
  .toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%) translateY(20px);background:var(--ink);
    color:var(--paper);padding:11px 18px;border-radius:30px;font-size:13.5px;box-shadow:var(--shadow);
    opacity:0;pointer-events:none;transition:.25s;z-index:900}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  .hidden{display:none!important}
</style>
</head>
<body>
<div class="wrap">
  <div class="head">
    <div><h1>오늘 점심 투표</h1><div class="dt" id="dateLine">—</div></div>
    <a class="back" href="./">← 점심 관리</a>
  </div>
  <div id="app"><div class="card"><div class="sub" style="margin:0">불러오는 중…</div></div></div>
  <div class="status" id="status"></div>
</div>
<div class="toast" id="toast"></div>

<script>
/* ===== 설정: 구글 Apps Script 웹앱 주소 =====
   점심 관리 앱과 같은 주소를 넣으세요. (관리 탭에 넣은 그 주소)
   비워두면 이 기기에 저장된 값을 자동으로 씁니다.
   팀원에게 링크를 공유하려면 반드시 여기에 넣어야 해요.            */
var GAS_URL = "https://script.google.com/macros/s/AKfycbxYopSOt0xcEE3x2fkXkZ2NUHv4W579PImYBu-h598r3iouqsyIPVae4GRCL-SAW8zl/exec";
</script>
<script>
(function(){
  "use strict";
  const $=s=>document.querySelector(s);
  let URL_=GAS_URL||'';
  if(!URL_){try{URL_=localStorage.getItem('lunch-gas-url')||'';}catch(e){}}

  const CATEMO={'국밥·탕·찌개':'🍲','칼국수·짬뽕·우동':'🍜','전골·나베':'🥘','냉면·막국수·콩국수':'🥶',
    '초밥·회':'🍣','샐러드·포케':'🥗','한식 백반':'🍚','분식':'🥟','덮밥·카레':'🍛','고기·구이':'🥩',
    '중식(짜장 등)':'🥢','양식·파스타':'🍝','버거·치킨':'🍔','아시안·기타':'🌏'};

  let data=null,me='',timer=null,busy=false;
  let PASS='';try{PASS=localStorage.getItem('lunch-pass')||'';}catch(e){}
  try{me=localStorage.getItem('lunch-voter')||'';}catch(e){}

  function esc(s){return String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
  let tt;function toast(m){const t=$('#toast');t.textContent=m;t.classList.add('show');
    clearTimeout(tt);tt=setTimeout(()=>t.classList.remove('show'),1900);}

  function renderPass(msg){
    $('#app').innerHTML=`<div class="card">
      <h2>🔒 비밀번호</h2>
      <div class="sub">${esc(msg||'팀에서 정한 비밀번호를 입력해 주세요.')}</div>
      <input type="password" id="passIn" placeholder="비밀번호" autocomplete="current-password">
      <button class="btn primary block" id="passOk" style="margin-top:12px">확인</button>
    </div>`;
    $('#status').textContent='';
    const go=async()=>{
      const v=$('#passIn').value.trim();
      if(!v){toast('비밀번호를 입력하세요');return;}
      PASS=v;try{localStorage.setItem('lunch-pass',v);}catch(e){}
      $('#passOk').textContent='확인 중…';await refresh();
    };
    $('#passOk').onclick=go;
    $('#passIn').addEventListener('keydown',e=>{if(e.key==='Enter')go();});
    setTimeout(()=>{const i=$('#passIn');if(i)i.focus();},80);
  }

  function dateLine(){const d=new Date();
    return `${d.getFullYear()}. ${String(d.getMonth()+1).padStart(2,'0')}. ${String(d.getDate()).padStart(2,'0')} ` +
      ['일','월','화','수','목','금','토'][d.getDay()]+'요일';}

  async function api(payload){
    payload.pass=PASS;
    const res=await fetch(URL_,{method:'POST',headers:{'Content-Type':'text/plain;charset=utf-8'},
      body:JSON.stringify(payload)});
    return await res.json();
  }
  async function refresh(quiet){
    if(!URL_){renderNoUrl();return;}
    if(busy)return;busy=true;
    if(!quiet)$('#status').textContent='불러오는 중…';
    try{
      const j=await api({action:'voteState'});
      if(j&&j.error==='auth'){data=null;
        renderPass(PASS?'비밀번호가 맞지 않아요. 다시 입력해 주세요.':'팀에서 정한 비밀번호를 입력해 주세요.');return;}
      if(!j||!j.ok)throw new Error(j&&j.error||'실패');
      data=j;render();
      $('#status').innerHTML='<span class="live"></span>실시간 · '+
        new Date().toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
    }catch(e){
      $('#status').textContent='연결 실패 · 잠시 후 다시 시도해요';
      if(!data)renderError(e);
    }finally{busy=false;}
  }

  function renderNoUrl(){
    $('#app').innerHTML=`<div class="card"><h2>연결이 필요해요</h2>
      <div class="sub">구글 Apps Script 주소가 설정되지 않았어요.</div>
      <div class="err">이 페이지 소스 위쪽의 <b>GAS_URL</b> 값에 점심 관리 앱과 같은 주소(<code>/exec</code>로 끝나는 것)를 넣어주세요.</div>
      <div class="hint">본인 기기에서는 점심 관리 앱을 먼저 열어 연결하면 자동으로 인식돼요.<br>
        팀원에게 링크를 공유하려면 파일에 직접 넣어야 합니다.</div></div>`;
    $('#status').textContent='';
  }
  function renderError(e){
    $('#app').innerHTML=`<div class="card"><h2>불러오지 못했어요</h2>
      <div class="err">${esc(String(e&&e.message||e))}</div>
      <div class="row" style="margin-top:12px"><button class="btn ghost sm" onclick="location.reload()">다시 시도</button></div></div>`;
  }

  function restById(id){return (data.state.restaurants||[]).find(r=>r.id===id);}
  function tally(){
    const t={};(data.vote.ballots||[]).forEach(b=>{
      if(!t[b.restId])t[b.restId]={n:0,who:[]};
      t[b.restId].n++;t[b.restId].who.push(b.voter);});
    return t;
  }
  function myPick(){const b=(data.vote.ballots||[]).find(x=>x.voter===me);return b?b.restId:'';}

  function render(){
    $('#dateLine').textContent=dateLine();
    const s=data.vote.session;
    if(!s)return renderSetup();
    if(s.status==='closed')return renderClosed(s);
    renderOpen(s);
  }

  /* 투표 시작 화면 */
  function renderSetup(){
    const list=data.state.restaurants||[];
    if(!list.length){$('#app').innerHTML=`<div class="card"><h2>식당이 없어요</h2>
      <div class="sub">점심 관리 앱에서 식당을 먼저 등록해 주세요.</div></div>`;return;}
    $('#app').innerHTML=`<div class="card">
      <h2>오늘 투표를 시작할까요?</h2>
      <div class="sub">후보에 넣을 식당을 골라주세요. 시작하면 팀원들이 투표할 수 있어요.</div>
      <div class="row" style="margin-bottom:10px">
        <button class="btn ghost sm" id="selAll">전체 선택</button>
        <button class="btn ghost sm" id="selNone">전체 해제</button>
      </div>
      <div id="chkList">${list.map(r=>`<label class="chk"><input type="checkbox" value="${r.id}" checked>
        <span>${CATEMO[r.cat]||'🍽️'} ${esc(r.name)}</span></label>`).join('')}</div>
      <button class="btn primary block" id="startBtn" style="margin-top:14px">투표 시작하기</button>
    </div>`;
    $('#selAll').onclick=()=>document.querySelectorAll('#chkList input').forEach(c=>c.checked=true);
    $('#selNone').onclick=()=>document.querySelectorAll('#chkList input').forEach(c=>c.checked=false);
    $('#startBtn').onclick=async()=>{
      const ids=[...document.querySelectorAll('#chkList input:checked')].map(c=>c.value);
      if(ids.length<2){toast('후보를 2곳 이상 골라주세요');return;}
      $('#startBtn').textContent='시작하는 중…';
      const j=await api({action:'voteStart',candidates:ids});
      if(j&&j.ok){toast('투표가 시작됐어요');refresh();}else{toast('시작 실패');$('#startBtn').textContent='투표 시작하기';}
    };
  }

  /* 투표 진행 화면 */
  function renderOpen(s){
    const t=tally(),mine=myPick(),total=(data.vote.ballots||[]).length;
    const max=Math.max(1,...Object.values(t).map(x=>x.n));
    const cands=s.candidates.map(restById).filter(Boolean);
    $('#app').innerHTML=`
      <div class="card">
        <label class="fl">내 이름</label>
        <input type="text" id="nameIn" value="${esc(me)}" placeholder="이름을 입력하세요" maxlength="12">
        <div class="sub" style="margin:8px 0 0">이름별로 한 표씩 · 다시 누르면 바꿀 수 있어요</div>
      </div>
      <div class="card">
        <h2>어디로 갈까요?</h2>
        <div class="sub">${total}명 참여 중${mine?' · 내 표: '+esc((restById(mine)||{}).name||''):''}</div>
        <div class="cand">${cands.map(r=>{
          const c=t[r.id]||{n:0,who:[]};const lead=c.n>0&&c.n===max;
          return `<div class="opt ${mine===r.id?'mine':''} ${lead?'lead':''}" data-id="${r.id}">
            ${mine===r.id?'<span class="badge-me">내 표</span>':''}
            <span class="fill" style="width:${total?Math.round(c.n/max*100):0}%"></span>
            <span class="inner"><span class="em">${CATEMO[r.cat]||'🍽️'}</span>
              <span class="nm">${esc(r.name)}
                <span class="who">${c.who.length?esc(c.who.join(', ')):'아직 없음'}</span></span>
              <span class="ct">${c.n}<span class="u">표</span></span></span></div>`;}).join('')}</div>
      </div>
      <div class="card">
        <div class="row">
          <button class="btn ghost sm" id="shareBtn">🔗 링크 공유</button>
          <button class="btn jade sm" id="closeBtn" style="margin-left:auto">투표 마감</button>
          <button class="btn ghost sm" id="resetBtn">다시 시작</button>
        </div>
      </div>`;
    $('#nameIn').addEventListener('input',e=>{me=e.target.value.trim();
      try{localStorage.setItem('lunch-voter',me);}catch(err){}});
    document.querySelectorAll('.opt').forEach(el=>el.onclick=async()=>{
      me=$('#nameIn').value.trim();
      if(!me){toast('이름을 먼저 입력해 주세요');$('#nameIn').focus();return;}
      try{localStorage.setItem('lunch-voter',me);}catch(err){}
      const r=restById(el.dataset.id);
      el.style.opacity='.55';
      const j=await api({action:'voteCast',voter:me,restId:r.id,restName:r.name});
      if(j&&j.ok){data.vote=j.vote;render();toast(`${r.name}에 투표했어요`);}
      else{toast('투표 실패');el.style.opacity='';}
    });
    $('#shareBtn').onclick=share;
    $('#closeBtn').onclick=async()=>{
      const entries=Object.entries(t);
      if(!entries.length){toast('아직 표가 없어요');return;}
      entries.sort((a,b)=>b[1].n-a[1].n);
      const top=entries.filter(e=>e[1].n===entries[0][1].n);
      const win=top[Math.floor(Math.random()*top.length)][0];
      if(top.length>1&&!confirm(`동점이에요 (${top.length}곳). 무작위로 한 곳을 뽑을까요?`))return;
      const j=await api({action:'voteClose',winnerId:win});
      if(j&&j.ok){data.vote=j.vote;render();}else toast('마감 실패');
    };
    $('#resetBtn').onclick=async()=>{
      if(!confirm('오늘 투표를 지우고 다시 시작할까요?'))return;
      const j=await api({action:'voteStart',candidates:[]});
      if(j&&j.ok){data.vote={session:null,ballots:[]};render();}
    };
  }

  /* 마감 화면 */
  function renderClosed(s){
    const t=tally(),win=restById(s.winner);
    const entries=Object.entries(t).sort((a,b)=>b[1].n-a[1].n);
    const max=Math.max(1,...entries.map(e=>e[1].n));
    const o=data.state.office||{};
    const dir=win?`https://map.kakao.com/link/from/${encodeURIComponent(o.name||'회사')},${o.lat},${o.lng}/to/${encodeURIComponent(win.name)},${win.lat},${win.lng}`:'';
    $('#app').innerHTML=`
      <div class="card">
        <div class="result">
          <div class="lbl">오늘의 점심은</div>
          <div class="win">${win?esc(win.name):'—'}</div>
          <div class="cnt">${win?(t[win.id]||{n:0}).n:0}표 · 총 ${(data.vote.ballots||[]).length}명 참여</div>
        </div>
        ${dir?`<a class="btn kakao block" href="${dir}" target="_blank" rel="noopener" style="margin-top:14px">🗺 카카오맵 길찾기</a>`:''}
      </div>
      <div class="card">
        <h2>결과</h2>
        <div class="cand">${entries.map(([id,c])=>{const r=restById(id);if(!r)return '';
          return `<div class="opt ${id===s.winner?'lead':''}">
            <span class="fill" style="width:${Math.round(c.n/max*100)}%"></span>
            <span class="inner"><span class="em">${CATEMO[r.cat]||'🍽️'}</span>
              <span class="nm">${esc(r.name)}<span class="who">${esc(c.who.join(', '))}</span></span>
              <span class="ct">${c.n}<span class="u">표</span></span></span></div>`;}).join('')}</div>
      </div>
      <div class="card"><div class="row">
        <button class="btn ghost sm" id="reopenBtn">다시 열기</button>
        <button class="btn ghost sm" id="newBtn" style="margin-left:auto">새로 투표하기</button>
      </div>
      <div class="hint">점심 관리 앱에서 <b>먹었어요</b>를 눌러 인원·금액을 기록하면 통계에 반영돼요.</div></div>`;
    $('#reopenBtn').onclick=async()=>{
      const j=await api({action:'voteStart',candidates:s.candidates});
      if(j&&j.ok){toast('투표를 다시 열었어요');refresh();}};
    $('#newBtn').onclick=async()=>{
      if(!confirm('오늘 투표를 지우고 새로 시작할까요?'))return;
      const j=await api({action:'voteStart',candidates:[]});
      if(j&&j.ok){data.vote={session:null,ballots:[]};render();}};
  }

  function share(){
    const url=location.href.split('#')[0];
    if(navigator.share){navigator.share({title:'오늘 점심 투표',url}).catch(()=>{});return;}
    if(navigator.clipboard){navigator.clipboard.writeText(url).then(()=>toast('링크를 복사했어요'));return;}
    prompt('이 링크를 공유하세요',url);
  }

  refresh();
  timer=setInterval(()=>{if(!document.hidden)refresh(true);},4000);
  document.addEventListener('visibilitychange',()=>{if(!document.hidden)refresh(true);});
})();
</script>
</body>
</html>
